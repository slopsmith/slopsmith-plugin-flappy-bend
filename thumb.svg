<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <!-- pipes -->
  <rect x="220" y="0"   width="32" height="60"  fill="#65a30d"/>
  <rect x="220" y="120" width="32" height="60"  fill="#65a30d"/>
  <rect x="160" y="0"   width="32" height="30"  fill="#16a34a"/>
  <rect x="160" y="90"  width="32" height="90"  fill="#16a34a"/>
  <!-- ideal curve -->
  <path d="M 40 130 Q 110 80 175 50 T 320 70" stroke="rgba(96,165,250,0.5)" stroke-width="2" fill="none"/>
  <!-- bird -->
  <circle cx="70" cy="105" r="11" fill="#facc15" stroke="#000" stroke-width="1.5"/>
  <circle cx="74" cy="102" r="1.6" fill="#000"/>
  <!-- title -->
  <text x="160" y="166" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="12">Flappy Bend</text>
</svg>
